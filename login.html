<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Khuwaja Surgical</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dark-mode.css" id="dark-mode-css" disabled>
</head>

<body class="login-page">

  <!-- ===== LOGIN PAGE ===== -->
  <div class="login-wrapper">

    <!-- Logo / Brand -->
    <div class="login-brand">
      <div class="brand-icon">🏥</div>
      <h1>Khuwaja Surgical</h1>
      <p>Wholesale Medical Store Management</p>
    </div>

    <!-- Card -->
    <div class="login-card">

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="login-tab">Login</button>
        <button class="tab-btn" id="register-tab">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <form class="auth-form" id="login-form" action="#" method="post">
        <h2 class="form-title">Welcome Back</h2>
        <p class="form-subtitle">Sign in to your account</p>

        <div class="form-group">
          <label for="login-email">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">📧</span>
            <input type="email" id="login-email" name="email" placeholder="    Enter your email" required>
          </div>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="login-password" name="password" placeholder="   Enter your password" required>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" name="remember"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          Login to Dashboard
        </button>

        <p class="switch-auth">
          Don't have an account?
          <a href="#" id="go-register">Register here</a>
        </p>
      </form>

      <!-- REGISTER FORM -->
      <form class="auth-form hidden" id="register-form" action="#" method="post">
        <h2 class="form-title">Create Account</h2>
        <p class="form-subtitle">Register a new user</p>

        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <div class="input-icon-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="reg-name" name="name" placeholder="   Your full name" required>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">📧</span>
            <input type="email" id="reg-email" name="email" placeholder="   Your email address" required>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-password">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="reg-password" name="password" placeholder="   Create a password" required>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="reg-confirm" name="confirm" placeholder="   Confirm your password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          Create Account
        </button>

        <p class="switch-auth">
          Already have an account?
          <a href="#" id="go-login">Login here</a>
        </p>
      </form>

    </div><!-- /.login-card -->
  </div><!-- /.login-wrapper -->
  <script src="js/db.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('SW: Registered ✓'))
        .catch(err => console.error('SW: Failed -', err));
    }
  </script>

</body>

</html>
