  <div class="main-wrapper">
    <header class="top-header">
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <div class="header-title">Settings</div>
      <div class="header-right">
        <button class="dark-toggle" id="dark-toggle" title="Toggle Dark Mode">🌙</button>
        <div class="user-badge">Admin</div>
      </div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <h2>Settings</h2>
        <p class="page-date">Configure your store preferences</p>
      </div>

      <div class="section-block">
        <h3 class="section-title">Business Information</h3>
        <form class="settings-form" action="#" method="post">
          <div class="form-row">
            <div class="form-group"><label for="biz-name">Business Name</label><input type="text" id="biz-name" name="business_name" value="Khuwaja Surgical" required></div>
            <div class="form-group"><label for="biz-phone">Phone Number</label><input type="text" id="biz-phone" name="phone" value="0300-1234567"></div>
          </div>
          <div class="form-group"><label for="biz-address">Business Address</label><textarea id="biz-address" name="address" rows="3">Main Bazar, Sukkur, Sindh, Pakistan</textarea></div>
          <div class="form-group"><label for="biz-email">Business Email</label><input type="email" id="biz-email" name="email" placeholder="info@khuwajasurical.com"></div>
          <div class="form-actions"><button type="submit" class="btn btn-primary">Save Business Info</button></div>
        </form>
      </div>

      <div class="section-block">
        <h3 class="section-title">Tax & Billing Settings</h3>
        <form class="settings-form" action="#" method="post">
          <div class="form-row">
            <div class="form-group"><label for="tax-rate">Tax Rate (%)</label><input type="number" id="tax-rate" name="tax_rate" value="17" step="0.1" min="0" max="100"><small class="field-hint">Standard GST in Pakistan is 17%</small></div>
            <div class="form-group"><label for="currency">Currency</label><select id="currency" name="currency"><option value="PKR" selected>PKR (Rs.)</option><option value="USD">USD ($)</option></select></div>
            <div class="form-group"><label for="low-stock-threshold">Low Stock Alert Below</label><input type="number" id="low-stock-threshold" name="low_stock" value="10" min="1"><small class="field-hint">Alert when stock falls below this</small></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label for="invoice-prefix">Invoice Prefix</label><input type="text" id="invoice-prefix" name="prefix" value="#" maxlength="5"></div>
            <div class="form-group"><label for="invoice-start">Starting Invoice No.</label><input type="number" id="invoice-start" name="inv_start" value="1001" min="1"></div>
          </div>
          <div class="form-actions"><button type="submit" class="btn btn-primary">Save Tax Settings</button></div>
        </form>
      </div>

      <div class="section-block">
        <h3 class="section-title">Print Layout Settings</h3>
        <form class="settings-form" action="#" method="post">
          <div class="form-row">
            <div class="form-group"><label for="print-width">Receipt Width</label><select id="print-width" name="print_width"><option value="58mm">58mm (Narrow Receipt)</option><option value="80mm" selected>80mm (Standard Receipt)</option><option value="A4">A4 (Full Page)</option></select></div>
            <div class="form-group"><label>Print Options</label>
              <div class="checkbox-group">
                <label class="checkbox-label"><input type="checkbox" name="show_logo" checked> Show Shop Name</label>
                <label class="checkbox-label"><input type="checkbox" name="show_tax" checked> Show Tax Breakdown</label>
                <label class="checkbox-label"><input type="checkbox" name="show_footer" checked> Show Footer Message</label>
              </div>
            </div>
          </div>
          <div class="form-group"><label for="footer-msg">Receipt Footer Message</label><input type="text" id="footer-msg" name="footer_msg" value="Thank you for your business! | Khuwaja Surgical"></div>
          <div class="form-actions"><button type="submit" class="btn btn-primary">Save Print Settings</button><button type="button" class="btn btn-outline" onclick="window.print()">Test Print</button></div>
        </form>
      </div>

      <div class="section-block">
        <h3 class="section-title">Change Password</h3>
        <form class="settings-form" action="#" method="post">
          <div class="form-row">
            <div class="form-group"><label for="current-pass">Current Password</label><input type="password" id="current-pass" name="current_password" placeholder="Current password"></div>
            <div class="form-group"><label for="new-pass">New Password</label><input type="password" id="new-pass" name="new_password" placeholder="New password"></div>
            <div class="form-group"><label for="confirm-pass">Confirm New Password</label><input type="password" id="confirm-pass" name="confirm_password" placeholder="Repeat new password"></div>
          </div>
          <div class="form-actions"><button type="submit" class="btn btn-primary">Update Password</button></div>
        </form>
      </div>
    </main>
  </div>
